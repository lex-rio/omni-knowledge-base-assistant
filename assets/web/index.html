<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omni</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Omni</h1>
      <span class="status" id="status">connecting…</span>
    </header>
    <main id="messages"></main>
    <footer>
      <form id="chat-form">
        <input type="text" id="input" placeholder="Ask something…" autocomplete="off" autofocus>
        <button type="submit">Send</button>
      </form>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
